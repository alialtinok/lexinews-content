name: Generate Articles

on:
  # Her gün UTC 06:00'da otomatik çalış (Türkiye saati 09:00)
  schedule:
    - cron: '0 6 * * *'

  # Manuel olarak da tetiklenebilsin (test için)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate articles
        env:
          AI_PROVIDER: groq
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Claude: AI_PROVIDER: claude + ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Gemini: AI_PROVIDER: gemini + GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PYTHONPATH=scripts python scripts/generate_articles.py

      - name: Commit and push updated articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/articles.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update articles $(date -u +%Y-%m-%d)"
            git push
          fi
